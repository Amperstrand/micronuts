[package]
name = "firmware"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
cortex-m = { workspace = true }
cortex-m-rt = { workspace = true }
defmt = { workspace = true, optional = true }
defmt-rtt = { workspace = true, optional = true }
panic-probe = { workspace = true, optional = true }
embedded-hal = { workspace = true }
embedded-hal-02 = { package = "embedded-hal", version = "0.2", features = ["unproven"] }
embedded-graphics = { workspace = true }
heapless = "0.8"
stm32f469i-disc = { workspace = true, features = ["usb_fs", "framebuffer", "rng", "touch"] }
ft6x06 = { git = "https://github.com/DougAnderson444/ft6x06", rev = "cc352f80b12fd985da4c4847771a26ebc03ece62" }
gm65-scanner = { workspace = true }
qrcodegen-no-heap = { workspace = true }
cashu-core-lite = { path = "../cashu-core-lite" }
micronuts-app = { path = "../micronuts-app" }
static_cell = "2.1"
usb-device = "0.3"
usbd-serial = "0.2"
critical-section = "1.2"
k256 = { workspace = true }
sha2 = { workspace = true }
hex = { version = "0.4", default-features = false, features = ["alloc"] }
linked_list_allocator = "0.10"
nb = "1.1"
rand_core = { workspace = true }

[features]
default = ["defmt"]
defmt = ["dep:defmt", "dep:defmt-rtt", "dep:panic-probe", "stm32f469i-disc/defmt"]

[profile.release]
debug = true
lto = true
opt-level = "s"
