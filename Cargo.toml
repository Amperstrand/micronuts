[workspace]
resolver = "2"
members = [
    "firmware",
    "cashu-core-lite",
    "host-mint-tool",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "0BSD"
repository = "https://github.com/Amperstrand/micronuts"
authors = ["Michael Fairman <mfairman@tegimeki.com>"]

[workspace.dependencies]
# Crypto
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"] }
sha2 = { version = "0.10", default-features = false }
rand_core = { version = "0.6", default-features = false }

# CBOR
minicbor = { version = "0.25", default-features = false, features = ["derive", "alloc"] }

# Embedded
cortex-m = "0.7"
cortex-m-rt = "0.7"
defmt = "1.0"
defmt-rtt = "1.0"
panic-probe = { version = "1.0", features = ["print-defmt"] }
embedded-hal = "1.0"
embedded-graphics = "0.8"

# BSP - pinned to working commit
stm32f469i-disc = { git = "https://github.com/Amperstrand/stm32f469i-disc", rev = "fa6dc86" }

# QR Scanner
gm65-scanner = { git = "https://github.com/Amperstrand/gm65-scanner", branch = "main", features = ["embedded-hal", "defmt"] }
